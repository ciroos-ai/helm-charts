{{- if and (not .Values.namespaceScoped) .Values.ebpfTopoColl.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-service-discovery-agent-to-service-discovery
  labels:
  {{- include "ciroos-agents.labels" . | nindent 4 }}
spec:
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: service-discovery-agent
    ports:
    - port: 50051
      protocol: TCP
  podSelector:
    matchLabels:
      app: service-discovery
  policyTypes:
  - Ingress
{{- end }}
