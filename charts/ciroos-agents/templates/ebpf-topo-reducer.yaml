apiVersion: v1
kind: Service
metadata:
  name: ebpf-topo-reducer
  labels:
  {{- include "ciroos-agents.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: ebpf-topo-reducer
    {{- include "ciroos-agents.selectorLabels" . | nindent 4 }}
  ports:
  - name: ebpf-reducer-grpc
    port: 50051
    protocol: TCP
    targetPort: 50051
  - name: ebpf-reducer-prometheus
    port: 7010
    protocol: TCP
    targetPort: 7010