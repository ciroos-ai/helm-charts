{{- if .Values.otelCollector.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  labels:
  {{- include "ciroos-agents.labels" . | nindent 4 }}
spec:
  type: {{ .Values.otelCollector.type }}
  selector:
    app: otel-collector
    {{- include "ciroos-agents.selectorLabels" . | nindent 4 }}
  ports:
  - port: 8888
    protocol: TCP
    targetPort: 8888
{{- end }}