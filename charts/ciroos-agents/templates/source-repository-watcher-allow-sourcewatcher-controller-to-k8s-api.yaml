{{- if .Values.sourceRepositoryWatcherController.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: source-repository-watcher-allow-sourcewatcher-controller-to-k8s-api
  labels:
  {{- include "ciroos-agents.labels" . | nindent 4 }}
spec:
  egress:
  - ports:
    - port: 443
      protocol: TCP
    - port: 6443
      protocol: TCP
  podSelector:
    matchLabels:
      app.kubernetes.io/name: source-repository-watcher
  policyTypes:
  - Egress
{{- end }}