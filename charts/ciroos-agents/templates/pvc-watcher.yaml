{{- if .Values.namespaceScoped }}
apiVersion: lib.ciroos.ai/v1beta1
kind: NamespacedResourceWatcher
metadata:
  name: pvc-watcher
  labels:
  {{- include "ciroos-agents.labels" . | nindent 4 }}
spec:
  resources:
  - dependencyRules:
    - direction: inbound
      expression: |
        [{
          "kind": "Namespace",
          "apiVersion": "v1",
          "name": resource.metadata.namespace,
          "namespace": ""
        }]
      name: namespace
      type: containment
    - direction: outbound
      expression: |
        has(resource.spec.storageClassName) ?
          [{
            "kind": "StorageClass",
            "apiVersion": "storage.k8s.io/v1",
            "name": resource.spec.storageClassName,
            "namespace": ""
          }] : []
      name: storageclass
      type: reference
    - direction: outbound
      expression: |
        has(resource.spec.volumeName) ?
          [{
            "kind": "PersistentVolume",
            "apiVersion": "v1",
            "name": resource.spec.volumeName,
            "namespace": ""
          }] : []
      name: persistentvolume
      type: storage
    groupVersionKind:
      group: ""
      kind: PersistentVolumeClaim
      version: v1
    matchRules:
    - expression: "true"
      name: all-pvcs
    name: pvcs
{{- else }}
