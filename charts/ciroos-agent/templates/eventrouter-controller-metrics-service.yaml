apiVersion: v1
kind: Service
metadata:
  name: eventrouter-controller-metrics-service
  labels:
  {{- include "ciroos-agents.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: eventrouter
    {{- include "ciroos-agents.selectorLabels" . | nindent 4 }}
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443