  labels:
  {{- include "ciroos-agents.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.beaconSa.serviceAccount.annotations | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: service-discovery
  labels:
  {{- include "ciroos-agents.labels" . | nindent 4 }}
