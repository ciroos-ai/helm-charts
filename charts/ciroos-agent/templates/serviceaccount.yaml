    {{- toYaml .Values.serviceDiscovery.serviceAccount.annotations | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: eventrouter-controller
  labels:
  {{- include "ciroos-agents.labels" . | nindent 4 }}
