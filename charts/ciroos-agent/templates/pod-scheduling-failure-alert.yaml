{{- if .Values.namespaceScoped }}
apiVersion: lib.ciroos.ai/v1beta1
kind: NamespacedAlert
metadata:
  name: pod-scheduling-failure-alert
spec:
  matchRules:
    - name: failed-scheduling
      expression: "resource.reason == 'FailedScheduling'"
{{- else }}
apiVersion: lib.ciroos.ai/v1beta1
kind: Alert
metadata:
  name: pod-scheduling-failure-alert
spec:
  matchRules:
    - name: failed-scheduling
      expression: "resource.reason == 'FailedScheduling'"
{{- end }}