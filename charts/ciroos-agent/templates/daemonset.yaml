{{- if and (not .Values.namespaceScoped) .Values.ebpfTopoColl.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: service-discovery-agent
  labels:
  {{- include "ciroos-agents.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: service-discovery-agent
    {{- include "ciroos-agents.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: service-discovery-agent
      {{- include "ciroos-agents.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - env:
        - name: SERVICE_DISCOVERY_AGENT_SVC_DISC_ADDR
          value: http://service-discovery:50051
        - name: SERVICE_DISCOVERY_AGENT_LOG_LEVEL
          value: info
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.serviceDiscoveryAgent.serviceDiscoveryAgent.image.repository }}:{{ .Values.serviceDiscoveryAgent.serviceDiscoveryAgent.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.serviceDiscoveryAgent.serviceDiscoveryAgent.imagePullPolicy }}
        name: service-discovery-agent
        resources: {{- toYaml .Values.serviceDiscoveryAgent.serviceDiscoveryAgent.resources | nindent 10
          }}
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          capabilities:
            add:
              {{- if .Values.serviceDiscoveryAgent.serviceDiscoveryAgent.useSysAdminCap }}
              - SYS_ADMIN
              {{- else }}
              - BPF
              - PERFMON
              {{- end }}
              - NET_ADMIN
              - SYS_RESOURCE
            drop:
              - ALL
        volumeMounts:
        - mountPath: /sys/fs/cgroup
          name: cgroup
          readOnly: true
      hostPID: true
      imagePullSecrets:
      - name: regcred
      volumes:
      - hostPath:
          path: /sys/fs/cgroup
          type: ""
        name: cgroup
{{- end }}
---
{{- if and (not .Values.namespaceScoped) .Values.otelCollector.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: otel-collector
  labels:
  {{- include "ciroos-agents.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: otel-collector
    {{- include "ciroos-agents.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        app: otel-collector
      {{- include "ciroos-agents.selectorLabels" . | nindent 8 }}
    spec:
      containers:
      - env:
        - name: K8S_NODE_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.hostIP
        - name: K8S_NODE_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: spec.nodeName
        - name: GOMEMLIMIT
          valueFrom:
            resourceFieldRef:
              divisor: "0"
              resource: limits.memory
        - name: GOGC
          value: "50"
        - name: GOMAXPROCS
          valueFrom:
            resourceFieldRef:
              divisor: "0"
              resource: limits.cpu
        - name: KUBERNETES_CLUSTER_DOMAIN
          value: {{ quote .Values.kubernetesClusterDomain }}
        image: {{ .Values.otelCollector.otelCollector.image.repository }}:{{ .Values.otelCollector.otelCollector.image.tag
          | default .Chart.AppVersion }}
        imagePullPolicy: {{ .Values.otelCollector.otelCollector.imagePullPolicy }}
        name: otel-collector
        ports:
        - containerPort: 8888
          protocol: TCP
        resources: {{- toYaml .Values.otelCollector.otelCollector.resources | nindent 10
          }}
        volumeMounts:
        - mountPath: /etc/otel/config.yaml
          name: otel-collector-config-vol
          subPath: config.yaml
      imagePullSecrets:
      - name: regcred
      volumes:
      - configMap:
          defaultMode: 420
          name: otel-collector-config
        name: otel-collector-config-vol
{{- end }}
