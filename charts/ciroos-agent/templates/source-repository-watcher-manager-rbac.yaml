{{- if and (not .Values.namespaceScoped) .Values.sourceRepositoryWatcherController.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: source-repository-watcher-manager-rolebinding
  labels:
  {{- include "ciroos-agents.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: 'source-repository-watcher-controller-role'
subjects:
- kind: ServiceAccount
  name: 'source-repository-watcher-controller'
  namespace: '{{ .Release.Namespace }}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: source-repository-watcher-manager-rolebinding
  labels:
  {{- include "ciroos-agents.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: 'source-repository-watcher-controller-role'
subjects:
- kind: ServiceAccount
  name: 'source-repository-watcher-controller'
  namespace: '{{ .Release.Namespace }}'
{{- end }}